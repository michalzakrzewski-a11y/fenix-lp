<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<meta name="description" content="{{metaDescription}}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<!-- GTM: wkleić snippet nowego kontenera tutaj (head) -->
<style>
:root{
  --green:#1d3a2a; --green-dark:#142b1f; --gold:#c8a45c; --cream:#faf7f0;
  --ink:#22271f; --muted:#5c6357;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Georgia,'Times New Roman',serif;color:var(--ink);background:var(--cream);line-height:1.6}
.wrap{max-width:1060px;margin:0 auto;padding:0 20px}
header.top{background:var(--green-dark);color:#fff;padding:14px 0}
header.top .wrap{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:1.15rem;letter-spacing:.14em;text-transform:uppercase}
.logo b{color:var(--gold)}
.top a{color:#fff;opacity:.85;text-decoration:none;font-size:.9rem;font-family:system-ui,sans-serif}
.hero{background:linear-gradient(155deg,var(--green) 0%,var(--green-dark) 70%);color:#fff;padding:72px 0 84px;text-align:center}
.badge{display:inline-block;font-family:system-ui,sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);border-radius:99px;padding:6px 16px;margin-bottom:26px}
.hero h1{font-size:clamp(2rem,5.5vw,3.4rem);font-weight:400;margin-bottom:18px}
.hero p{max-width:620px;margin:0 auto 34px;font-size:1.12rem;opacity:.92}
.cta{display:inline-block;background:var(--gold);color:var(--green-dark);font-family:system-ui,sans-serif;font-weight:600;text-decoration:none;padding:15px 34px;border-radius:6px;font-size:1.02rem;transition:transform .15s}
.cta:hover{transform:translateY(-2px)}
section{padding:64px 0}
h2{font-size:clamp(1.5rem,3.5vw,2.1rem);font-weight:400;margin-bottom:22px;color:var(--green)}
h2::after{content:"";display:block;width:56px;height:3px;background:var(--gold);margin-top:12px}
.prose p{margin-bottom:14px;max-width:70ch}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;margin-top:34px}
.feature{background:#fff;border:1px solid #e7e2d5;border-radius:10px;padding:22px}
.feature h3{font-family:system-ui,sans-serif;font-size:1rem;color:var(--green);margin-bottom:8px}
.feature p{font-size:.93rem;color:var(--muted);font-family:system-ui,sans-serif}
.brand{background:#f1ecdf}
.stores-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-top:30px;align-items:start}
#map{height:440px;border-radius:12px;border:1px solid #d9d2bf;z-index:0}
.store-list{display:flex;flex-direction:column;gap:12px;max-height:440px;overflow-y:auto}
.store{background:#fff;border:1px solid #e7e2d5;border-radius:10px;padding:16px 18px;cursor:pointer;transition:border-color .15s}
.store:hover{border-color:var(--gold)}
.store h3{font-family:system-ui,sans-serif;font-size:1rem;color:var(--green)}
.store p{font-family:system-ui,sans-serif;font-size:.88rem;color:var(--muted)}
.store a{color:var(--green);font-family:system-ui,sans-serif;font-size:.88rem}
footer{background:var(--green-dark);color:#fff;padding:30px 0;text-align:center;font-family:system-ui,sans-serif;font-size:.85rem;opacity:.95}
@media(max-width:820px){.stores-grid{grid-template-columns:1fr}#map{height:320px}}
</style>
</head>
<body>
<!-- GTM: snippet noscript tutaj (body) -->
<header class="top">
  <div class="wrap">
    <div class="logo">Fenix <b>Horse</b></div>
    <a href="https://fenix.net.pl">fenix.net.pl →</a>
  </div>
</header>

<div class="hero">
  <div class="wrap">
    <span class="badge">{{badge}}</span>
    <h1>{{heroTitle}}</h1>
    <p>{{heroTagline}}</p>
    <a class="cta" href="#sklepy" data-gtm="cta-hero">{{ctaLabel}}</a>
  </div>
</div>

<section>
  <div class="wrap">
    <h2>{{productHeading}}</h2>
    <div class="prose">{{productDescription}}</div>
    <div class="features">{{featuresHtml}}</div>
  </div>
</section>

<section class="brand">
  <div class="wrap">
    <h2>{{brandHeading}}</h2>
    <div class="prose">{{brandDescription}}</div>
  </div>
</section>

<section id="sklepy">
  <div class="wrap">
    <h2>{{storesHeading}}</h2>
    <p class="prose">{{storesIntro}}</p>
    <div class="stores-grid">
      <div id="map"></div>
      <div class="store-list">{{storesHtml}}</div>
    </div>
  </div>
</section>

<footer><div class="wrap">{{footerNote}}</div></footer>

<script>window.L_DISABLE_3D = true;</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const stores = {{storesJson}};
const map = L.map('map', {
  zoomAnimation: false, fadeAnimation: false, markerZoomAnimation: false,
  scrollWheelZoom: false,           // kółko myszy przewija stronę, nie zoomuje mapy
  dragging: !L.Browser.mobile       // na telefonie strona przewija się palcem nad mapą
}).setView([52.1, 19.3], 6);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);
const markers = stores.map(s =>
  L.marker([s.lat, s.lng]).addTo(map)
    .bindPopup(`<b>${s.name}</b><br>${s.address}<br><a href="tel:${s.phone.replace(/\s/g,'')}">${s.phone}</a>`)
);
document.querySelectorAll('.store').forEach((el, i) => {
  el.addEventListener('click', () => {
    map.setView([stores[i].lat, stores[i].lng], 13);
    markers[i].openPopup();
    window.dataLayer && window.dataLayer.push({event: 'store_click', store_name: stores[i].name});
  });
});
</script>
</body>
</html>
